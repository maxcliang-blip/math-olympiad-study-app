<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Olympiad Study App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
:root {
  --bg: #f5f6fa;
  --card: #fff;
  --text: #1a1a2e;
  --muted: #6c757d;
  --blue: #4361ee;
  --blue-bg: #eef0ff;
  --green: #2d9f5e;
  --green-bg: #e8f5e9;
  --red: #e74c3c;
  --red-bg: #fdecea;
  --border: #e0e0e0;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  display: flex;
  min-height: 100vh;
}
.sidebar {
  width: 260px;
  background: var(--card);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
}
.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 { font-size: 18px; font-weight: 700; color: var(--blue); }
.sidebar-header p { font-size: 12px; color: var(--muted); }
.sidebar-actions { padding: 12px 20px; display: flex; gap: 6px; }
.sidebar-actions .btn { flex: 1; font-size: 11px; padding: 6px 4px; text-align: center; }
.export-btn { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.import-btn { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
.nav-group { padding: 12px 0; border-bottom: 1px solid var(--border); }
.nav-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: var(--muted); padding: 0 20px 8px;
}
.nav-item {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 10px 20px; font-size: 14px;
  background: none; border: none; text-align: left; cursor: pointer;
  color: var(--text); transition: .15s; border-left: 3px solid transparent;
  font-family: var(--font);
}
.nav-item:hover { background: var(--blue-bg); }
.nav-item.active { background: var(--blue-bg); border-left-color: var(--blue); color: var(--blue); font-weight: 600; }
.nav-item .count { font-size: 12px; color: var(--muted); font-weight: 400; }
.main {
  margin-left: 260px;
  flex: 1;
  padding: 40px 48px;
  max-width: 960px;
}
.main h2 { font-size: 28px; font-weight: 700; }
.subtitle { color: var(--muted); font-size: 15px; margin-bottom: 8px; }
.progress {
  height: 6px; background: var(--border); border-radius: 3px;
  margin: 16px 0 24px; overflow: hidden;
}
.progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s; }
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-top {
  padding: 16px 20px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.num {
  width: 32px; height: 32px; min-width: 32px;
  border-radius: 50%;
  background: var(--blue-bg); color: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.num.done { background: var(--green-bg); color: var(--green); }
.card-body { flex: 1; }
.card-body p { margin: 0; }
.tag {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 10px; border-radius: 20px; margin-top: 4px;
  background: var(--blue-bg); color: var(--blue);
}
.tag.done { background: var(--green-bg); color: var(--green); }
.acts { display: flex; gap: 6px; align-items: center; white-space: nowrap; }
.btn {
  font-family: var(--font); font-size: 13px; font-weight: 600;
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; transition: .15s; color: var(--text);
}
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { opacity: .85; }
.btn-green { background: var(--green); color: #fff; border-color: var(--green); }
.btn-green:hover { opacity: .85; }
.btn-red { background: var(--red); color: #fff; border-color: var(--red); }
.btn-red:hover { opacity: .85; }

/* Answer input */
.hints { padding: 0 20px 14px; }
.hint-item {
  background: #fff8e1; border-left: 3px solid #f9a825; padding: 10px 14px;
  margin-bottom: 8px; border-radius: 0 8px 8px 0; font-size: 14px;
}
.hint-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: #f57f17; margin-bottom: 4px;
}
.hint-btn {
  font-family: var(--font); font-size: 12px; font-weight: 600;
  padding: 5px 12px; border-radius: 6px; border: 1px solid #f9a825;
  background: #fff8e1; color: #f57f17; cursor: pointer; transition: .15s;
  margin: 0 20px 8px;
}
.hint-btn:hover { background: #fff3c4; }
.hint-btn:disabled { opacity: .4; cursor: default; }

/* Solution textarea */
.sol-write { padding: 0 20px 14px; }
.sol-write-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: var(--blue); margin-bottom: 6px;
}
.sol-textarea {
  width: 100%; min-height: 100px; font-family: var(--font);
  font-size: 14px; padding: 10px 14px; border: 2px solid var(--border);
  border-radius: 8px; outline: none; resize: vertical; line-height: 1.5;
  transition: .15s;
}
.sol-textarea:focus { border-color: var(--blue); }
.sol-preview {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; margin-top: 8px; min-height: 40px; font-size: 14px;
}
.sol-preview .katex { font-size: 1em; }
.latex-toolbar {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding: 8px;
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
}
.latex-btn {
  font-family: "Courier New", monospace; font-size: 12px; font-weight: 600;
  padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg); cursor: pointer; transition: .15s; color: var(--text);
}
.latex-btn:hover { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.ans-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.ans-input {
  font-family: var(--font);
  font-size: 14px;
  padding: 7px 12px;
  border: 2px solid var(--border);
  border-radius: 8px;
  outline: none;
  flex: 1;
  min-width: 120px;
  transition: .15s;
}
.ans-input:focus { border-color: var(--blue); }
.ans-input.correct { border-color: var(--green); background: var(--green-bg); }
.ans-input.wrong { border-color: var(--red); background: var(--red-bg); }
.ans-feedback {
  font-size: 13px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
}
.ans-feedback.correct { color: var(--green); }
.ans-feedback.wrong { color: var(--red); }
.ans-expected {
  font-size: 13px;
  color: var(--muted);
}
.ans-expected .katex { font-size: 1.1em; }

.sol {
  padding: 0 20px 16px; border-top: 1px solid var(--border); padding-top: 14px;
}
.sol-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: var(--muted); margin-bottom: 6px;
}
.lesson {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 24px 32px; margin-bottom: 24px;
  border: 1px solid var(--border);
}
.lesson h3 { font-size: 20px; font-weight: 700; margin-bottom: 12px; color: var(--blue); }
.lesson h4 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; }
.lesson p { margin-bottom: 10px; }
.lesson .ex {
  background: var(--blue-bg); border-radius: 8px;
  padding: 16px 20px; margin: 12px 0;
}
.lesson .ex-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; color: var(--blue); }
.lesson table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
.lesson th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--blue); font-weight: 600; }
.lesson td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.lesson ul { padding-left: 20px; margin-bottom: 10px; }
.lesson li { margin-bottom: 4px; }
.lesson .katex-display { margin: 8px 0; }
.lvl { font-size: 20px; font-weight: 700; margin: 32px 0 16px; }

/* Topics */
.topic-cat { font-size: 20px; font-weight: 700; margin: 28px 0 12px; color: var(--blue); }
.topic-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; margin-bottom: 6px;
  background: var(--card); border-radius: 10px;
  border: 1px solid var(--border);
}
.topic-check {
  width: 22px; height: 22px; min-width: 22px;
  border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; margin-top: 1px; cursor: pointer;
  transition: .15s;
}
.topic-check.done { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.topic-check:hover { border-color: var(--blue); }
.topic-body { flex: 1; }
.topic-name { font-size: 15px; font-weight: 600; }
.topic-name.done { color: var(--green); text-decoration: line-through; opacity: .7; }
.topic-notes { font-size: 13px; color: var(--muted); margin-top: 2px; }
.topic-progress { margin-top: 24px; }
.topic-progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 8px; }
.topic-progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width .4s; }
.topic-summary { font-size: 14px; color: var(--muted); margin-top: 8px; }
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 20px 16px; }
  .ans-row { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar"></div>
<div class="main" id="main"></div>

<script>
const K = window.katex;
const opts = { throwOnError: false };
const inline = tex => K.renderToString(tex, opts);
const display = tex => K.renderToString(tex, Object.assign({}, opts, { displayMode: true }));

function R(s) {
  s = s.replace(/\\\[(.*?)\\\]/gs, (_, t) => display(t));
  s = s.replace(/\\\((.*?)\\\)/g, (_, t) => inline(t));
  return s;
}

// Normalize a string for answer comparison
function norm(s) {
  return s.toLowerCase()
    .replace(/\s+/g, '')
    .replace(/\\sqrt\{(\w+)\}/g, 'sqrt$1')
    .replace(/√(\w*)/g, (_, x) => 'sqrt' + x)
    .replace(/\\frac\{(\w+)\}\{(\w+)\}/g, '$1/$2')
    .replace(/\\cdot/g, '*')
    .replace(/\\/g, '')
    .replace(/[{}\\]+/g, '') // remove remaining braces/backslashes
    .replace(/[−–]/g, '-');
}

function matchAns(userAns, storedAns) {
  const u = norm(userAns);
  const alts = storedAns.split('|');
  for (let a of alts) {
    if (u === norm(a)) return true;
  }
  return false;
}

const SECTIONS = [
  {
    id: "roadmap",
    title: "USAJMO Roadmap",
    sub: "Topics needed to qualify for USAJMO",
    type: "topics",
    group: "Roadmap",
    topics: [
      { cat: "Algebra", items: [
        { name: "Polynomials & Vieta's Formulas", status: "done", notes: "Mastered in Symmetric Polynomials" },
        { name: "Symmetric Polynomials", status: "done", notes: "40 practice problems + AIME" },
        { name: "Inequalities I (AM-GM, Cauchy, Engel)", status: "done", notes: "Lesson + 20 practice + AIME" },
        { name: "Inequalities II (Schur, Jensen, SOS, uvw)", status: "done", notes: "Lesson + 20 practice" },
        { name: "Sequences & Series", status: "todo", notes: "Arithmetic, geometric, telescoping, recurrence" },
        { name: "Functional Equations", status: "todo", notes: "Cauchy-type, injective/surjective, P(x,y)" },
        { name: "Logarithms & Exponents", status: "todo", notes: "Properties, inequalities, equations" },
        { name: "Complex Numbers", status: "todo", notes: "Roots of unity, De Moivre, geometric interpretation" },
        { name: "Polynomial Interpolation", status: "todo", notes: "Lagrange, finite differences" },
      ]},
      { cat: "Geometry", items: [
        { name: "Triangle Geometry", status: "todo", notes: "Centers, cevians, Stewart's, trig" },
        { name: "Circle Geometry", status: "todo", notes: "Power of a point, radical axis, Ptolemy" },
        { name: "Coordinate/Bashing", status: "todo", notes: "Barycentric, complex, Cartesian" },
        { name: "Transformations", status: "todo", notes: "Inversion, projective, spiral similarity" },
        { name: "Lemmas", status: "todo", notes: "Euler line, Sawayama, Feuerbach" },
        { name: "3D Geometry", status: "todo", notes: "Cross sections, sphere problems" },
      ]},
      { cat: "Number Theory", items: [
        { name: "Divisibility & Primes", status: "todo", notes: "GCD, LCM, prime factorization" },
        { name: "Modular Arithmetic", status: "todo", notes: "CRT, Fermat's Little, Euler's theorem" },
        { name: "Diophantine Equations", status: "todo", notes: "Linear, Pythagorean, Pell's" },
        { name: "Quadratic Residues", status: "todo", notes: "Legendre symbol, law of quadratic reciprocity" },
        { name: "p-adic Valuations", status: "todo", notes: "Lifting the exponent, order" },
        { name: "Orders & Primitive Roots", status: "todo", notes: "Discrete log, structure of (Z/nZ)*" },
      ]},
      { cat: "Combinatorics", items: [
        { name: "Counting Techniques", status: "todo", notes: "Stars and bars, bijections, inclusion-exclusion" },
        { name: "Bijections & Combinatorial Proofs", status: "todo", notes: "Double counting, hockey stick" },
        { name: "Pigeonhole Principle", status: "todo", notes: "Direct, weighted, extremal" },
        { name: "Invariants & Monovariants", status: "todo", notes: "Coloring arguments, parity" },
        { name: "Generating Functions", status: "todo", notes: "Ordinary, exponential, applications" },
        { name: "Recurrence Relations", status: "todo", notes: "Characteristic equation, Catalan numbers" },
      ]},
    ]
  },
  {
    id: "sym-practice",
    title: "Symmetric Polynomials",
    sub: "40 practice problems across 6 levels",
    type: "prac",
    group: "Symmetric Polynomials",
    levels: [
      {
        n: "Level 1: Basic Rewriting",
        probs: [
          [1, "Express \\(x^2 + y^2\\) in terms of \\(s\\) and \\(p\\), where \\(s = x+y,\\; p = xy\\).", "\\(x^2 + y^2 = (x+y)^2 - 2xy = s^2 - 2p\\)", "s^2-2p"],
          [2, "Express \\(x^3 + y^3\\) in terms of \\(s\\) and \\(p\\).", "\\(x^3 + y^3 = (x+y)(x^2 - xy + y^2) = s(s^2 - 2p - p) = s^3 - 3ps\\)", "s^3-3ps"],
          [3, "Express \\(x^4 + y^4\\) in terms of \\(s\\) and \\(p\\).", "\\(x^4 + y^4 = (x^2+y^2)^2 - 2x^2y^2 = (s^2-2p)^2 - 2p^2\\)", "s^4-4ps^2+2p^2"],
          [4, "Express \\(x^5 + y^5\\) in terms of \\(s\\) and \\(p\\).", "\\(x^5 + y^5 = s^5 - 5ps^3 + 5p^2s\\)", "s^5-5ps^3+5p^2s"],
          [5, "Express \\(x^2y + xy^2\\) in terms of \\(s\\) and \\(p\\).", "\\(x^2y + xy^2 = xy(x+y) = sp\\)", "sp"],
          [6, "Express \\(x^3y + xy^3\\) in terms of \\(s\\) and \\(p\\).", "\\(x^3y + xy^3 = xy(x^2+y^2) = p(s^2-2p)\\)", "p(s^2-2p)|ps^2-2p^2"],
          [7, "Express \\(x^3y^2 + x^2y^3\\) in terms of \\(s\\) and \\(p\\).", "\\(x^3y^2 + x^2y^3 = x^2y^2(x+y) = p^2s\\)", "p^2s"],
          [8, "Express \\((x-y)^2\\) in terms of \\(s\\) and \\(p\\).", "\\((x-y)^2 = x^2 - 2xy + y^2 = (s^2-2p)-2p = s^2-4p\\)", "s^2-4p"],
        ]
      },
      {
        n: "Level 2: Substitution & Evaluation",
        probs: [
          [9, "Given \\(x+y=5,\\; xy=6\\), find \\(x^2+y^2\\).", "\\(s^2-2p = 25-12 = 13\\)", "13"],
          [10, "Given \\(x+y=5,\\; xy=6\\), find \\(x^3+y^3\\).", "\\(s^3-3ps = 125-90 = 35\\)", "35"],
          [11, "Given \\(x+y=5,\\; xy=6\\), find \\(x^4+y^4\\).", "\\((s^2-2p)^2-2p^2 = 13^2-72 = 97\\)", "97"],
          [12, "Given \\(x+y=5,\\; xy=6\\), find \\(x^5+y^5\\).", "\\(s^5-5ps^3+5p^2s = 3125-3750+900 = 275\\)", "275"],
          [13, "Given \\(x+y=5,\\; xy=6\\), find \\(\\frac1x+\\frac1y\\).", "\\(\\frac{x+y}{xy} = \\frac{s}{p} = \\frac56\\)", "5/6"],
          [14, "Given \\(x+y=5,\\; xy=6\\), find \\(\\frac1{x^2}+\\frac1{y^2}\\).", "\\(\\frac{x^2+y^2}{x^2y^2} = \\frac{13}{36}\\)", "13/36"],
          [15, "Given \\(x+y=5,\\; xy=6\\), find \\(x^2y+xy^2\\).", "\\(sp = 5\\cdot6 = 30\\)", "30"],
          [16, "Given \\(x+y=5,\\; xy=6\\), find \\((x-y)^2\\).", "\\(s^2-4p = 25-24 = 1\\)", "1"],
        ]
      },
      {
        n: "Level 3: System Solving",
        probs: [
          [17, "Solve: \\(x+y=4,\\; x^2+y^2=10\\).", "\\(S_2 = s^2-2p \\Rightarrow 10=16-2p \\Rightarrow p=3\\). Quadratic \\(t^2-4t+3=0\\). Solutions: \\((1,3)\\) or \\((3,1)\\).", "(1,3)|(3,1)"],
          [18, "Solve: \\(x+y=3,\\; x^3+y^3=18\\).", "\\(S_3 = s^3-3ps \\Rightarrow 18=27-9p \\Rightarrow p=1\\). Quadratic \\(t^2-3t+1=0\\). Solutions: \\(\\left(\\frac{3+\\sqrt5}{2},\\frac{3-\\sqrt5}{2}\\right)\\) or swapped.", "((3+√5)/2,(3-√5)/2)|((3-√5)/2,(3+√5)/2)|(1+√2,1-√2)"],
          [19, "Solve: \\(x+y=2,\\; x^4+y^4=34\\).", "\\(S_4 = (4-2p)^2-2p^2 = 34 \\Rightarrow p=-1\\). Quadratic \\(t^2-2t-1=0\\). Solutions: \\((1+\\sqrt2,\\;1-\\sqrt2)\\) or swapped.", "(1+√2,1-√2)|(1-√2,1+√2)"],
          [20, "Solve: \\(x+y=1,\\; x^3+y^3=19\\).", "\\(S_3 = s^3-3ps \\Rightarrow 19=1-3p \\Rightarrow p=-6\\). Quadratic \\(t^2-t-6=0\\). Solutions: \\((3,-2)\\) or \\((-2,3)\\).", "(3,-2)|(-2,3)"],
        ]
      },
      {
        n: "Level 4: AIME-Style",
        probs: [
          [21, "Let \\(x,y\\) be real with \\(x+y=3,\\; x^2+y^2=7\\). Find \\(x^5+y^5\\).", "\\(S_2 = s^2-2p \\Rightarrow 7=9-2p \\Rightarrow p=1\\). Recurrence: \\(S_3=18,\\; S_4=47,\\; S_5=123\\).", "123"],
          [22, "Suppose \\(x+y=2,\\; x^3+y^3=14\\). Find \\(x^2+y^2\\).", "\\(S_3 = s^3-3ps \\Rightarrow 14=8-6p \\Rightarrow p=-1\\). \\(S_2 = s^2-2p = 4-2(-1)=6\\).", "6"],
          [23, "If \\(x+y=5,\\; x^2+y^2=13\\), find \\(x^2y+xy^2\\).", "\\(S_2 = s^2-2p \\Rightarrow 13=25-2p \\Rightarrow p=6\\). \\(x^2y+xy^2 = sp = 30\\).", "30"],
          [24, "Let \\(r,s\\) be roots of \\(x^2-7x+10=0\\). Compute \\(r^3+s^3\\) without solving.", "\\(s=7,\\; p=10\\). \\(r^3+s^3 = s^3-3ps = 343-210 = 133\\).", "133"],
          [25, "Suppose \\(x+y=a,\\; xy=b\\). Express \\(x^4+y^4\\) in \\(a,b\\). Then evaluate for \\(a=2,\\; b=-1\\).", "\\(x^4+y^4 = (a^2-2b)^2-2b^2 = a^4-4a^2b+2b^2\\). For \\(a=2,\\; b=-1\\): \\(16+16+2=34\\).", "a^4-4a^2b+2b^2|34"],
        ]
      },
      {
        n: "Level 5: Challenge",
        probs: [
          [26, "Find all real pairs \\((x,y)\\): \\(x+y=6,\\; x^4+y^4=272\\).", "\\(S_4=(36-2p)^2-2p^2=272 \\Rightarrow p=8\\). \\(t^2-6t+8=0\\). Solutions: \\((2,4)\\) or \\((4,2)\\).", "(2,4)|(4,2)"],

    sections: [
      { h: "1. AM-GM (Arithmetic Mean \u2265 Geometric Mean)",
        c: [
          { t: "p", v: "For nonnegative \\(a_1,\\dots,a_n\\):" },
          { t: "d", v: "\\frac{a_1 + a_2 + \\cdots + a_n}{n} \\ge (a_1 a_2 \\cdots a_n)^{1/n}" },
          { t: "p", v: "Equality iff \\(a_1 = a_2 = \\cdots = a_n\\)." },
          { t: "h4", v: "Two-variable case" },
          { t: "d", v: "\\frac{a+b}{2} \\ge \\sqrt{ab} \\quad\\Longleftrightarrow\\quad a+b \\ge 2\\sqrt{ab}" },
          { t: "h4", v: "Three-variable case" },
          { t: "d", v: "\\frac{a+b+c}{3} \\ge \\sqrt[3]{abc} \\quad\\Longleftrightarrow\\quad a+b+c \\ge 3\\sqrt[3]{abc}" },

          { t: "p", v: "If the product is constant, AM-GM gives the minimum sum. If the sum is constant, it gives the maximum product." },
          { t: "ex", title: "Example 1", v: "Minimize \\(x + \\frac{4}{x}\\) for \\(x > 0\\).<br><br>By AM-GM: \\(\\frac{x + 4/x}{2} \\ge \\sqrt{x \\cdot 4/x} = 2 \\Rightarrow x + \\frac{4}{x} \\ge 4\\).<br>Equality at \\(x = \\frac{4}{x} \\Rightarrow x=2\\)." },

          { t: "h4", v: "Key technique: splitting terms" },
          { t: "p", v: "When a term like \\(kx\\) appears, split it into \\(k\\) copies of \\(x\\) (or equal parts) so variables cancel when multiplied." },

      { h: "2. Cauchy-Schwarz Inequality",
        c: [
          { t: "p", v: "For any real \\(a_1,\\dots,a_n,\\; b_1,\\dots,b_n\\):" },
          { t: "d", v: "(a_1^2 + \\cdots + a_n^2)(b_1^2 + \\cdots + b_n^2) \\ge (a_1b_1 + \\cdots + a_nb_n)^2" },
          { t: "p", v: "Equality when \\((a_1,\\dots,a_n)\\) is proportional to \\((b_1,\\dots,b_n)\\)." },

          { t: "ex", title: "Example 3", v: "For \\(x,y>0\\) with \\(x+2y=6\\), minimize \\(x^2+y^2\\).<br><br>By Cauchy: \\((x^2+y^2)(1^2+2^2) \\ge (x+2y)^2 = 36 \\Rightarrow x^2+y^2 \\ge \\frac{36}{5}\\).<br>Equality: \\(\\frac{x}{1} = \\frac{y}{2} \\Rightarrow y=2x,\\; x+4x=6 \\Rightarrow x=\\frac65,\\; y=\\frac{12}{5}\\)." },
          { t: "ex", title: "Example 4", v: "For \\(a,b,c>0\\) with \\(a+b+c=1\\), minimize \\(a^2+b^2+c^2\\).<br><br>\\((a^2+b^2+c^2)(1+1+1) \\ge (a+b+c)^2 = 1 \\Rightarrow a^2+b^2+c^2 \\ge \\frac13\\).<br>Equality at \\(a=b=c=\\frac13\\)." },
        ]

      { h: "3. Engel Form (Titu\u2019s Lemma)",
        c: [
          { t: "p", v: "For \\(b_1,\\dots,b_n > 0\\):" },
          { t: "d", v: "\\frac{a_1^2}{b_1} + \\cdots + \\frac{a_n^2}{b_n} \\ge \\frac{(a_1+\\cdots+a_n)^2}{b_1+\\cdots+b_n}" },
          { t: "p", v: "Equality when \\(\\frac{a_1}{b_1} = \\cdots = \\frac{a_n}{b_n}\\)." },
          { t: "ex", title: "Example 5", v: "For \\(x,y>0\\) with \\(x+y=1\\), minimize \\(\\frac1x + \\frac1y\\).<br><br>Rewrite: \\(\\frac{1^2}{x} + \\frac{1^2}{y} \\ge \\frac{(1+1)^2}{x+y} = \\frac{4}{1} = 4\\).<br>Equality at \\(x=y=\\frac12\\)." },
          { t: "ex", title: "Example 6", v: "Prove \\((a+b+c)(\\frac1a+\\frac1b+\\frac1c) \\ge 9\\) for \\(a,b,c>0\\).<br><br>\\(\\frac1a+\\frac1b+\\frac1c = \\frac{1^2}{a}+\\frac{1^2}{b}+\\frac{1^2}{c} \\ge \\frac{(1+1+1)^2}{a+b+c} = \\frac{9}{a+b+c}\\).<br>Multiply by \\(a+b+c\\) to get the result. Equality at \\(a=b=c\\)." },

// State
let cur = "sym-practice";
let sols = JSON.parse(localStorage.getItem("msol") || "{}");
let openSols = {};
let hintStates = {};
let userSolutions = JSON.parse(localStorage.getItem("msolutions") || "{}");
let checkStates = JSON.parse(localStorage.getItem("mcheck") || "{}");

const API_BASE = location.pathname.startsWith('/math') ? '/math' : '';

// Try to load progress from server
async function syncLoad() {
  try {
    const r = await fetch(API_BASE + '/api/load', { signal: AbortSignal.timeout(5000) });
    if (!r.ok) return;
    const data = await r.json();
    if (data.sols) { sols = data.sols; localStorage.setItem("msol", JSON.stringify(sols)); }
    if (data.checkStates) { checkStates = data.checkStates; localStorage.setItem("mcheck", JSON.stringify(checkStates)); }
    if (data.userSolutions) { userSolutions = data.userSolutions; localStorage.setItem("msolutions", JSON.stringify(userSolutions)); }
    render();
  } catch(e) { /* server not available, use local */ }
}

// Save progress to server
function syncSave() {
  const data = JSON.stringify({ sols, checkStates, userSolutions });
  fetch(API_BASE + '/api/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: data, signal: AbortSignal.timeout(5000) }).catch(() => {});
}

function key(s, p) { return s + "-" + p; }
function done(s, p) { return !!sols[key(s, p)]; }

function toggle(s, p) {
  const k = key(s, p);
  sols[k] = !sols[k];
  localStorage.setItem("msol", JSON.stringify(sols));
  syncSave();
  render();
}

function checkAns(sid, pid, ansStr) {
  const k = key(sid, pid);
  const sec = SECTIONS.find(s => s.id === sid);
  for (const l of sec.levels) {
    for (const p of l.probs) {
      if (p[0] === pid) {
        const correct = matchAns(ansStr, p[3]);
        checkStates[k] = correct ? "correct" : "wrong";
        if (correct) {
          sols[k] = true;
          localStorage.setItem("msol", JSON.stringify(sols));
        }
        localStorage.setItem("mcheck", JSON.stringify(checkStates));
        syncSave();
render();
        return;
      }
    }
  }
}

function render() {
  // Sidebar
  let side = '<div class="sidebar-header"><h1>Math Olympiad</h1><p>Study App</p></div>';
  side += '<div class="sidebar-actions"><button class="btn export-btn" onclick="exportProgress()">Export</button><button class="btn import-btn" onclick="document.getElementById(\'importFile\').click()">Import</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importProgress(this)"></div>';
  let lastGroup = "";
  SECTIONS.forEach(sec => {
    if (sec.group !== lastGroup) {
      if (lastGroup) side += '</div>';
      side += '<div class="nav-group"><div class="nav-label">' + sec.group + '</div>';
      lastGroup = sec.group;
    }
    side += '<div class="nav-item' + (cur === sec.id ? " active" : "") + '" onclick="go(\'' + sec.id + '\')">' + sec.title;
    if (sec.type === "prac") {
      let t = 0, d = 0;
      sec.levels.forEach(l => l.probs.forEach(p => { t++; if (done(sec.id, p[0])) d++; }));
      side += ' <span class="count">' + d + '/' + t + '</span>';
    }
    side += '</div>';
  });
  side += '</div>';
  document.getElementById("sidebar").innerHTML = side;

  const sec = SECTIONS.find(s => s.id === cur);
  const main = document.getElementById("main");
  if (sec.type === "lesson") renderLesson(main, sec);
  else if (sec.type === "topics") renderTopics(main, sec);
  else renderPrac(main, sec);
}

function renderPrac(main, sec) {
  let t = 0, d = 0;
  sec.levels.forEach(l => l.probs.forEach(p => { t++; if (done(sec.id, p[0])) d++; }));
  let html = '<h2>' + sec.title + '</h2><p class="subtitle">' + sec.sub + '</p>';
  html += '<div class="progress"><div class="progress-fill" style="width:' + (t ? (d/t*100) : 0) + '%"></div></div>';
  sec.levels.forEach(l => {
    html += '<div class="lvl">' + l.n + '</div>';
    l.probs.forEach(p => {
      const sid = sec.id, pid = p[0], solved = done(sid, pid), open = !!openSols[key(sid, pid)];
      const ck = checkStates[key(sid, pid)] || "";
      const hints = p[4] || [];
      const hk = key(sid, pid);
      const hintLevel = hintStates[hk] || 0;
      html += '<div class="card"><div class="card-top">';
      html += '<div class="num' + (solved ? ' done' : '') + '">' + (solved ? '&#10003;' : pid) + '</div>';
      html += '<div class="card-body"><p>' + R(p[1]) + '</p>';

      // Answer input row
      html += '<div class="ans-row">';
      html += '<input class="ans-input' + (ck === "correct" ? ' correct' : ck === "wrong" ? ' wrong' : '') + '" type="text" id="input-' + key(sid, pid) + '" placeholder="Your answer..." onkeydown="if(event.key===\'Enter\')checkAns(\'' + sid + '\',' + pid + ',this.value)" value="' + (ck ? '' : '') + '">';
      html += '<button class="btn btn-primary" onclick="checkAns(\'' + sid + '\',' + pid + ',document.getElementById(\'input-' + key(sid, pid) + '\').value)">Check</button>';
      if (ck === "correct") html += '<span class="ans-feedback correct">&#10003; Correct!</span>';
      else if (ck === "wrong") html += '<span class="ans-feedback wrong">&#10007; Incorrect — expected ' + R(p[3].split('|')[0]) + '</span>';
      html += '</div>';

      html += '<span class="tag' + (solved ? ' done' : '') + '">' + (solved ? 'Solved' : 'Unsolved') + '</span>';
      html += '</div><div class="acts" onclick="event.stopPropagation()">';
      if (hints.length) html += '<button class="hint-btn" onclick="showHint(\'' + sid + '\',' + pid + ',' + (hintLevel + 1) + ')"' + (hintLevel >= hints.length ? ' disabled' : '') + '>Hint ' + (hintLevel || 0) + '/' + hints.length + '</button>';
      html += '<button class="btn" onclick="toggleSol(\'' + sid + '\',' + pid + ')">' + (open ? 'Hide' : 'Show') + ' Solution</button>';
      html += '</div></div>';
      if (hints.length && hintLevel > 0) {
        html += '<div class="hints">';
        for (let i = 0; i < hintLevel && i < hints.length; i++) {
          html += '<div class="hint-item"><div class="hint-label">Hint ' + (i+1) + '</div>' + R(hints[i]) + '</div>';
        }
        html += '</div>';
      }
      if (p[1].toLowerCase().includes('prove')) {
        const solKey = key(sid, pid);
        const savedSol = userSolutions[solKey] || '';
        html += '<div class="sol-write">';
        html += '<div class="sol-write-label">Your Solution</div>';
        html += '<textarea class="sol-textarea" id="sol-ta-' + solKey + '" placeholder="Write your proof here... Use \\( \\) for inline LaTeX" oninput="saveUserSolution(\'' + sid + '\',' + pid + ',this.value);renderPreview(\'' + sid + '\',' + pid + ')">' + savedSol.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</textarea>';
        html += '<div class="latex-toolbar">';
        ['\\(','\\)','\\[','\\]','\\frac{}{}','\\sqrt{}','\\sum','\\prod','\\int','\\infty','\\le','\\ge','\\neq','\\approx','\\pm','\\times','\\cdot','\\alpha','\\beta','\\gamma','\\theta','\\phi','\\psi','\\omega','\\pi','\\sigma','\\Delta','\\nabla','\\forall','\\exists','\\in','\\subset','\\cup','\\cap','\\Rightarrow','\\Leftrightarrow','\\rightarrow','\\leftarrow','\\text{}','\\textbf{}','\\textit{}','\\mathbb{R}','\\mathbb{Z}','\\mathbb{N}','\\mathbb{Q}','\\mathbb{C}'].forEach(sym => {
          html += '<button class="latex-btn" onclick="insertLatex(\'' + sid + '\',' + pid + ',\'' + sym.replace(/\\/g,'\\\\') + '\')">' + sym.replace(/\\\\/g,'\\') + '</button>';
        });
        html += '</div>';
        html += '<div class="sol-preview" id="sol-prev-' + solKey + '">';
        if (savedSol) html += R(savedSol);
        else html += '<span style="color:var(--muted)">Your solution will appear here...</span>';
        html += '</div></div>';
      }
      if (open) html += '<div class="sol"><div class="sol-label">Solution</div>' + R(p[2]) + '</div>';
      html += '</div>';
    });
  });
  main.innerHTML = html;
}

function renderLesson(main, sec) {
  let html = '<h2>' + sec.title + '</h2><p class="subtitle">' + sec.sub + '</p>';
  sec.sections.forEach(s => {
    html += '<div class="lesson"><h3>' + R(s.h) + '</h3>';
    s.c.forEach(item => {
      if (item.t === "p") html += '<p>' + R(item.v) + '</p>';
      else if (item.t === "d") html += K.renderToString(item.v, Object.assign({}, opts, { displayMode: true }));
      else if (item.t === "h4") html += '<h4>' + R(item.v) + '</h4>';
      else if (item.t === "ex") html += '<div class="ex"><div class="ex-title">' + item.title + '</div>' + R(item.v) + '</div>';
      else if (item.t === "table") {
        html += '<table><thead><tr>';
        item.headers.forEach(h => html += '<th>' + h + '</th>');
        html += '</tr></thead><tbody>';
        item.rows.forEach(r => { html += '<tr>'; r.forEach(c => html += '<td>' + R(c) + '</td>'); html += '</tr>'; });
        html += '</tbody></table>';
      }
      else if (item.t === "ul") { html += '<ul>'; item.v.forEach(x => html += '<li>' + R(x) + '</li>'); html += '</ul>'; }
    });
    html += '</div>';
  });
  main.innerHTML = html;
}

function renderTopics(main, sec) {
  let total = 0, doneCount = 0;
  sec.topics.forEach(cat => cat.items.forEach(item => {
    total++;
    if (item.status === "done") doneCount++;
  }));
  let html = '<h2>' + sec.title + '</h2><p class="subtitle">' + sec.sub + '</p>';
  html += '<div class="topic-progress"><div class="topic-progress-bar"><div class="topic-progress-fill" style="width:' + (total ? (doneCount/total*100) : 0) + '%"></div></div>';
  html += '<div class="topic-summary">' + doneCount + ' / ' + total + ' topics completed (' + Math.round(doneCount/total*100) + '%)</div></div>';
  sec.topics.forEach(cat => {
    html += '<div class="topic-cat">' + cat.cat + '</div>';
    cat.items.forEach((item, i) => {
      const isDone = item.status === "done";
      html += '<div class="topic-item">';
      html += '<div class="topic-check' + (isDone ? ' done' : '') + '" onclick="toggleTopic(\'' + sec.id + '\',' + sec.topics.indexOf(cat) + ',' + i + ')">' + (isDone ? '&#10003;' : '') + '</div>';
      html += '<div class="topic-body"><div class="topic-name' + (isDone ? ' done' : '') + '">' + item.name + '</div>';
      html += '<div class="topic-notes">' + item.notes + '</div></div></div>';
    });
  });
  main.innerHTML = html;
}

function toggleTopic(secId, catIdx, itemIdx) {
  const sec = SECTIONS.find(s => s.id === secId);
  const item = sec.topics[catIdx].items[itemIdx];
  item.status = item.status === "done" ? "todo" : "done";
  localStorage.setItem("mtopics", JSON.stringify(getTopicStates()));
  render();
}

function getTopicStates() {
  const states = {};
  SECTIONS.filter(s => s.type === "topics").forEach(sec => {
    states[sec.id] = sec.topics.map(cat => cat.items.map(item => item.status));
  });
  return states;
}

function loadTopicStates() {
  const saved = JSON.parse(localStorage.getItem("mtopics") || "{}");
  SECTIONS.filter(s => s.type === "topics").forEach(sec => {
    if (saved[sec.id]) {
      sec.topics.forEach((cat, ci) => {
        cat.items.forEach((item, ii) => {
          if (saved[sec.id][ci] && saved[sec.id][ci][ii]) item.status = saved[sec.id][ci][ii];
        });
      });
    }
  });
}

function toggleSol(s, p) {
  const k = key(s, p);
  openSols[k] = !openSols[k];
  render();
}

function showHint(s, p, n) {
  const k = key(s, p);
  if (!hintStates[k]) hintStates[k] = 0;
  if (hintStates[k] < n) hintStates[k] = n;
  render();
}

function saveUserSolution(s, p, text) {
  const k = key(s, p);
  userSolutions[k] = text;
  localStorage.setItem("msolutions", JSON.stringify(userSolutions));
}

function insertLatex(s, p, latex) {
  const ta = document.getElementById('sol-ta-' + key(s, p));
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const val = ta.value;
  ta.value = val.slice(0, start) + latex + val.slice(end);
  ta.selectionStart = ta.selectionEnd = start + latex.length;
  ta.focus();
  saveUserSolution(s, p, ta.value);
  renderPreview(s, p);
}

function renderPreview(s, p) {
  const ta = document.getElementById('sol-ta-' + key(s, p));
  const prev = document.getElementById('sol-prev-' + key(s, p));
  if (!ta || !prev) return;
  const text = ta.value;
  if (!text.trim()) { prev.innerHTML = '<span style="color:var(--muted)">Your solution will appear here...</span>'; return; }
  prev.innerHTML = R(text);
}

function go(id) { cur = id; openSols = {}; render(); }

function exportProgress() {
  const data = { sols: sols, checkStates: checkStates };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'math-progress-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importProgress(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.sols) { sols = data.sols; localStorage.setItem("msol", JSON.stringify(sols)); }
      if (data.checkStates) { checkStates = data.checkStates; localStorage.setItem("mcheck", JSON.stringify(checkStates)); }
      syncSave();
loadTopicStates();
syncLoad().then(() => render());
    } catch(err) {
      alert("Invalid progress file.");
    }
  };
  reader.readAsText(file);
  input.value = '';
}

render();
</script>
</body>
</html>
